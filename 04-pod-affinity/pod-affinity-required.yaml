apiVersion: v1
kind: Pod
metadata:
  name: backend-required-pod

spec:
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - frontend
        topologyKey: kubernetes.io/hostname

  containers:
  - name: nginx
    image: nginx