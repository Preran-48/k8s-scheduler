apiVersion: v1
kind: Pod
metadata:
  name: backend-preferred-pod

spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - frontend
          topologyKey: kubernetes.io/hostname

  containers:
  - name: nginx
    image: nginx