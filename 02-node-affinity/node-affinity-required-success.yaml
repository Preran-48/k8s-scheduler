apiVersion: v1
kind: Pod
metadata:
  name: affinity-required-demo-pod-success

spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - ssd

  containers:
  - name: nginx
    image: nginx