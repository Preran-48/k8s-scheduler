apiVersion: v1
kind: Pod
metadata:
  name: affinity-required-demo-pod-fail

spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - nvme

  containers:
  - name: nginx
    image: nginx