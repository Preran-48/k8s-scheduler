apiVersion: v1
kind: Pod
metadata:
  name: affinity-preferred-demo-pod

spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: disktype
            operator: In
            values:
            - ssd

  containers:
  - name: nginx
    image: nginx